<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>מעקב תרגול תלמידים</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>מעקב תרגול תלמידים</h1>
        <p class="subtitle">שליפה חיה מהריפו הציבורי • ח׳ ו־ט׳ • חישוב נטו ללא הפסקות</p>
      </div>
      <button id="installBtn" class="secondary hidden">התקן אפליקציה</button>
    </header>

    <section class="live-banner">
      <div id="repoStatus">ממתין לטעינה…</div>
      <div id="lastRefresh">טרם רוענן</div>
    </section>

    <main class="content">
      <section id="screen-yomi" class="screen active">
        <div class="filters-card">
          <div class="filters-grid">
            <label><span>חיפוש</span><input id="searchInput" type="search" placeholder="שם תלמיד / משימה" /></label>
            <label><span>כיתה</span><select id="classFilter"><option value="">כל הכיתות</option></select></label>
            <label><span>תלמיד</span><select id="studentFilter"><option value="">כל התלמידים</option></select></label>
            <label><span>מתאריך</span><input id="dateFrom" type="date" /></label>
            <label><span>עד תאריך</span><input id="dateTo" type="date" /></label>
          </div>
          <div class="actions-row">
            <button id="refreshBtn">רענון נתונים</button>
            <button id="resetBtn" class="secondary">איפוס סינון</button>
          </div>
        </div>
        <div id="summaryBar" class="summary-bar"></div>
        <div id="dailyList" class="cards"></div>
      </section>

      <section id="screen-student" class="screen"><div id="studentView" class="cards"></div></section>
      <section id="screen-class" class="screen">
        <div class="filters-card">
          <div class="filters-grid">
            <label><span>בחר כיתה</span><select id="classScreenFilter"><option value="">בחר כיתה</option></select></label>
          </div>
        </div>
        <div id="classView" class="cards"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-screen="yomi" class="nav-btn active">יומי</button>
      <button data-screen="student" class="nav-btn">לפי תלמיד</button>
      <button data-screen="class" class="nav-btn">לפי כיתה</button>
    </nav>
  </div>
</body>
</html>
